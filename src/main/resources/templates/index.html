<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Intelligens Eszközök Kezelése</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 40px;
            background: #f4f4f4;
        }

        .user-card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        button {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<h1>Családi Eszközkezelő</h1>

<div style="width: 380px;">
    <form action="/simulate" method="post" style="margin-bottom: 10px;">
        <button type="submit" style="width: 100%; background: #28a745;">Szimuláció: Új családtag hozzáadása</button>
    </form>

    <form action="/" method="get" style="display: flex; gap: 5px;">
        <input type="text" name="keyword" th:value="${keyword}" placeholder="Keresés..." style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
        <button type="submit" style="background: #007bff; padding: 10px 15px;">Keresés</button>
    </form>
</div>

<div style="background: #e9ecef; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
    <h3>Új eszköz és felhasználó regisztrálása</h3>
    <form action="/add-user" method="post" style="display: grid; gap: 10px; max-width: 400px;">
        <input type="text" name="userName" placeholder="Felhasználó neve" required style="padding: 8px;">
        <input type="text" name="deviceName" placeholder="Eszköz neve (pl. iPhone 15)" required style="padding: 8px;">
        <input type="text" name="menuTitle" placeholder="Főmenü neve" required style="padding: 8px;">
        <input type="text" name="wallpaperName" placeholder="Háttérkép neve" style="padding: 8px;">

        <button type="submit" style="background: #28a745; margin-top: 10px;">Regisztráció Mentése</button>
    </form>
</div>

<hr>

<div th:each="user : ${users}" class="user-card">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px;">
        <div>
            <form th:action="@{/update-user/{id}(id=${user.id})}" method="post" style="display: flex; gap: 8px;">
                <input type="text" name="newName" th:value="${user.name}" style="font-size: 1.1em; font-weight: bold; padding: 4px; border: 1px solid #ccc; border-radius: 4px;">
                <button type="submit" style="background: #495057; padding: 5px 12px; font-size: 0.85em;">Név módosítása</button>
            </form>
            <small style="color: #888; display: block; margin-top: 4px;">Azonosító: <span th:text="${user.id}"></span></small>
        </div>
        <form th:action="@{/delete-user/{id}(id=${user.id})}" method="post">
            <button type="submit" style="background: #dc3545; font-weight: bold;">FELHASZNÁLÓ TÖRLÉSE</button>
        </form>
    </div>

    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 250px; background: #f8f9fa; padding: 10px; border-radius: 6px;">
            <div th:each="device : ${user.devices}">
                <p><strong>Eszköz:</strong> <span th:text="${device.name}"></span></p>
                <p><strong>Arculat:</strong> <span th:text="${device.mainMenu.title}"></span></p>
                <p><strong>Háttér:</strong> <span th:text="${device.mainMenu.wallpaperName}"></span></p>
            </div>
        </div>

        <div style="flex: 1; min-width: 300px;">
            <label style="font-size: 0.8em; font-weight: bold; color: #555;">IKON HOZZÁADÁSA:</label>
            <form th:action="@{/add-icon/{id}(id=${user.id})}" method="post" style="margin-bottom: 10px;">
                <input type="text" name="iconName" placeholder="Pl. Facebook" required style="padding: 6px;">
                <button type="submit" style="background: #17a2b8; padding: 7px 15px;">Hozzáadás</button>
            </form>

            <label style="font-size: 0.8em; font-weight: bold; color: #555;">MEGJELENÉS MÓDOSÍTÁSA:</label>
            <form th:action="@{/update-theme/{id}(id=${user.id})}" method="post" style="display: flex; gap: 5px;">
                <input type="text" name="theme" placeholder="Új arculat..." style="width: 100px; padding: 6px;">
                <input type="text" name="wallpaper" placeholder="Új háttér..." style="width: 100px; padding: 6px;">
                <button type="submit" style="background: #ffc107; color: black; padding: 7px 15px;">Váltás</button>
            </form>
        </div>
    </div>

    <div style="margin-top: 15px; background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 6px;">
        <span style="font-weight: bold; margin-right: 10px;">Hozzáadott ikonok:</span>
        <div th:each="device : ${user.devices}" style="display: inline-block;">
            <div th:each="icon : ${device.mainMenu.icons}"
                 style="display: inline-flex; align-items: center; background: #e9ecef; padding: 4px 10px; border-radius: 20px; margin: 4px; border: 1px solid #dee2e6;">

            <span th:text="${icon.iconName}"
                  th:data-name="${icon.iconName}"
                  onclick="alert('Rendszerüzenet: A(z) ' + this.getAttribute('data-name') + ' alkalmazás elindult!')"
                  style="cursor: pointer; color: #0056b3; font-weight: 500; text-decoration: underline; margin-right: 8px;">
            </span>

                <form th:action="@{/delete-icon/{userId}/{iconId}(userId=${user.id}, iconId=${icon.id})}" method="post" style="display: inline;">
                    <button type="submit" style="background: none; color: #dc3545; padding: 0; border: none; font-weight: bold; cursor: pointer; font-size: 1.2em; line-height: 1;">×</button>
                </form>
            </div>
            <span th:if="${#lists.isEmpty(device.mainMenu.icons)}" style="color: #999; font-style: italic;">Nincs telepített ikon.</span>
        </div>
    </div>
</div>
</body>
</html>
